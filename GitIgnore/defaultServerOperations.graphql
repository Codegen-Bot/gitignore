query ParseGraphQLOperation($graphql: [AdditionalFileInput!]!) {
  graphQL(additionalFiles: $graphql) {
    operations {
      name
      operationType
      text
      variables {
        name
        type {
          text
        }
      }
      nestedSelection {
        depth
        fieldSelection {
          name
          alias
          arguments {
            name
            type {
              text
            }
            value
          }
        }
        fragmentSpreadSelection {
          name
        }
      }
    }
  }
}