targetPath: .
installs:
  - botId: 'bot://core/output'
    botVersion: 1.0.0
  - botId: 'bot://core/filesystem'
    botVersion: 1.0.0
  - botId: 'bot://core/log'
    botVersion: 1.0.0
  - botId: 'bot://core/schema'
    botVersion: 1.0.0
  - botId: 'bot://parse/graphql'
    botVersion: 1.0.0
  - botId: 'bot://core/random'
    botVersion: 1.0.0
  - botId: 'bot://hub/.gitignore'
    botVersion: 0.0.1-alpha1
    configuration:
      outputPath: null
    dependencies:
      - targetPath: .
        botId: 'bot://core/output'
      - targetPath: .
        botId: 'bot://core/filesystem'
      - targetPath: .
        botId: 'bot://core/log'
  - botId: 'bot://hub/dotnet/solution'
    botVersion: 0.0.1-alpha1
    configuration:
      outputPath: GitIgnore.sln
    dependencies:
      - targetPath: .
        botId: 'bot://core/output'
      - targetPath: .
        botId: 'bot://core/filesystem'
      - targetPath: .
        botId: 'bot://core/log'
  - botId: 'bot://hub/dotnet/botfactory'
    botVersion: 0.0.1-alpha64
    configuration:
      id: 'bot://hub/.gitignore'
      outputPath: GitIgnore
      projectName: GitIgnore
      language: CSHARP
      deduplicateConfigurationSchema: true
      copybots: []
      provideApi: true
      minimalWorkingExample: false
      dotnetVersion: DotNet8
    dependencies:
      - targetPath: .
        botId: 'bot://core/output'
      - targetPath: .
        botId: 'bot://core/filesystem'
      - targetPath: .
        botId: 'bot://core/log'
      - botId: 'bot://core/schema'
      - botId: 'bot://hub/.gitignore'
